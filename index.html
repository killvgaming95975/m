<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Label Manager - HD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for Reading PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <!-- jsPDF for Generating PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        /* Custom Dotted Background */
        .dotted-bg {
            background-color: #fdf2f8; 
            background-image: radial-gradient(#fbcfe8 1.5px, transparent 1.5px); 
            background-size: 24px 24px;
        }
        /* Smooth animations */
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 dotted-bg">

    <!-- Main App Card -->
    <div class="bg-white max-w-[400px] w-full rounded-[28px] shadow-2xl overflow-hidden relative z-10 border border-pink-100">
        
        <!-- Header Section -->
        <div class="bg-gradient-to-br from-[#f83a93] to-[#f460a3] p-8 text-center text-white relative">
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
            <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-20 h-20 bg-white opacity-10 rounded-full blur-lg"></div>
            
            <h1 class="text-[22px] font-bold flex justify-center items-center gap-2 relative z-10 tracking-wide">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                Meesho Manager
            </h1>
            <p class="text-[13px] font-medium mt-1 text-pink-100 relative z-10 opacity-90">
                HD Quality • Multi-File Merge
            </p>
        </div>

        <!-- Content Section -->
        <div class="p-6 space-y-6">
            
            <!-- Printer Type Dropdown -->
            <div>
                <label class="flex items-center gap-2 text-[14px] font-bold text-gray-700 mb-2">
                    <span class="text-xl">📦</span> Select Printer Type:
                </label>
                <div class="relative">
                    <select id="printerType" class="w-full appearance-none border border-gray-200 rounded-xl p-3.5 text-gray-700 font-medium focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 bg-white shadow-sm transition-all">
                        <option value="a4">A4 Printer (4 Labels/Page)</option>
                        <option value="label">Label Printer (Thermal 4x6)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-pink-500">
                        <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <!-- PDF File Upload -->
            <div>
                <label class="flex items-center gap-2 text-[14px] font-bold text-gray-700 mb-2">
                    <span class="text-xl">🏷️</span> Select PDF File(s):
                </label>
                <div class="border-2 border-[#f83a93] rounded-xl p-1 bg-white shadow-sm hover:shadow-md transition-all">
                    <input type="file" id="pdfInput" accept="application/pdf" multiple 
                           class="w-full text-sm text-gray-600 
                                  file:mr-4 file:py-2.5 file:px-4 
                                  file:rounded-lg file:border-0 
                                  file:text-sm file:font-bold 
                                  file:bg-pink-50 file:text-[#f83a93] 
                                  hover:file:bg-pink-100 cursor-pointer p-1 outline-none">
                </div>
            </div>

            <!-- Status Box -->
            <div>
                <label class="flex items-center gap-2 text-[14px] font-bold text-gray-700 mb-2">
                    <span class="text-xl">📝</span> Status Details:
                </label>
                <div id="statusBox" class="bg-[#fdf2f8] text-gray-600 rounded-xl p-4 text-center text-[13px] font-medium min-h-[60px] flex items-center justify-center border border-pink-100">
                    Upload PDF files to start HD cropping.
                </div>
            </div>

            <!-- Action Button -->
            <button id="processBtn" onclick="processPDF()" class="btn-press w-full bg-[#f83a93] hover:bg-[#e02e80] text-white font-bold text-[15px] py-3.5 rounded-xl shadow-[0_8px_15px_-5px_rgba(248,58,147,0.5)] transition-all flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                Crop & Download HD Labels
                <div id="loadingSpinner" class="hidden w-5 h-5 border-[3px] border-white border-t-transparent rounded-full animate-spin ml-1"></div>
            </button>

        </div>
    </div>

    <script>
        // Update Status Box when files are selected
        document.getElementById('pdfInput').addEventListener('change', function(e) {
            const fileCount = e.target.files.length;
            const statusBox = document.getElementById('statusBox');
            if (fileCount > 0) {
                statusBox.innerHTML = `<span class="text-[#f83a93] font-bold">${fileCount} File(s) Selected</span> <br/> Ready to crop in High Quality!`;
            } else {
                statusBox.innerHTML = `Upload PDF files to start HD cropping.`;
            }
        });

        async function processPDF() {
            const fileInput = document.getElementById('pdfInput');
            const processBtn = document.getElementById('processBtn');
            const spinner = document.getElementById('loadingSpinner');
            const statusBox = document.getElementById('statusBox');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                statusBox.innerHTML = `<span class="text-red-500 font-bold">⚠️ Error: Please select at least one PDF file!</span>`;
                return;
            }

            const files = fileInput.files;
            const printerType = document.getElementById('printerType').value;
            
            // UI Loading State
            processBtn.disabled = true;
            processBtn.classList.add('opacity-80');
            spinner.classList.remove('hidden');
            statusBox.innerHTML = `<span class="text-blue-500 font-bold">⚙️ Processing HD labels... Please wait.</span>`;

            try {
                const { jsPDF } = window.jspdf;
                let doc;
                
                if (printerType === 'label') {
                    doc = new jsPDF({ orientation: 'p', unit: 'mm', format: [100, 150] }); 
                } else {
                    doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' }); 
                }

                let globalLabelCount = 0; 
                let totalFiles = files.length;

                for (let f = 0; f < files.length; f++) {
                    const file = files[f];
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const numPages = pdf.numPages;

                    for (let i = 1; i <= numPages; i++) {
                        const page = await pdf.getPage(i);
                        
                        // HD FIX 1: Scale ko 2.5 se badha kar 4.0 kar diya (Ultra High Resolution)
                        const viewport = page.getViewport({ scale: 4.0 }); 
                        
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        // HD FIX 2: Enable high-quality smoothing on canvas
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';

                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                        // Backend Cut Adjusted (0.415 Cut)
                        const cropW = canvas.width;
                        const cropH = canvas.height * 0.415; 

                        // Rotate Image -90 degrees
                        const rotatedCanvas = document.createElement('canvas');
                        const rCtx = rotatedCanvas.getContext('2d');
                        
                        rotatedCanvas.width = cropH; 
                        rotatedCanvas.height = cropW;

                        rCtx.imageSmoothingEnabled = true;
                        rCtx.imageSmoothingQuality = 'high';

                        rCtx.save();
                        rCtx.translate(rotatedCanvas.width / 2, rotatedCanvas.height / 2);
                        rCtx.rotate(-Math.PI / 2);
                        rCtx.drawImage(canvas, 0, 0, cropW, cropH, -cropW / 2, -cropH / 2, cropW, cropH);
                        rCtx.restore();

                        // HD FIX 3: JPEG ki jagah PNG use kiya gaya hai. PNG lossless hota hai jisse text nahi phatta.
                        const imgData = rotatedCanvas.toDataURL('image/png'); 
                        const imgRatio = rotatedCanvas.width / rotatedCanvas.height;

                        if (printerType === 'label') {
                            if (globalLabelCount > 0) doc.addPage();
                            let printW = 96;
                            let printH = printW / imgRatio;
                            if (printH > 146) {
                                printH = 146;
                                printW = printH * imgRatio;
                            }
                            // HD FIX 4: jsPDF ko PNG format accept karne ke liye bataya gaya
                            doc.addImage(imgData, 'PNG', (100 - printW) / 2, (150 - printH) / 2, printW, printH); 
                        } else {
                            const idx = globalLabelCount % 4; 
                            if (globalLabelCount > 0 && idx === 0) doc.addPage();
                            let printW = 95;
                            let printH = printW / imgRatio;
                            if (printH > 138.5) {
                                printH = 138.5;
                                printW = printH * imgRatio;
                            }
                            const col = idx % 2;
                            const row = Math.floor(idx / 2);
                            doc.addImage(imgData, 'PNG', (col * 105) + (105 - printW) / 2, (row * 148.5) + (148.5 - printH) / 2, printW, printH);
                        }
                        
                        globalLabelCount++;
                        // Status Box me live update
                        statusBox.innerHTML = `<span class="text-blue-500 font-bold">⚙️ Processing... (${f+1}/${totalFiles} Files) - Label ${globalLabelCount}</span>`;
                    }
                }

                // Download final result
                doc.save(`Meesho_Ready_Labels_HD_${Date.now()}.pdf`);
                statusBox.innerHTML = `<span class="text-green-500 font-bold">✅ Success! ${globalLabelCount} HD Labels Downloaded.</span>`;
                
            } catch (error) {
                console.error("Error:", error);
                statusBox.innerHTML = `<span class="text-red-500 font-bold">❌ Error processing PDF. Check file.</span>`;
            } finally {
                // Reset UI
                processBtn.disabled = false;
                processBtn.classList.remove('opacity-80');
                spinner.classList.add('hidden');
                fileInput.value = ""; 
            }
        }
    </script>
</body>
</html>
